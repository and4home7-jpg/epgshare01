name: Auto Download and Deploy

on:
  schedule:
    - cron: '0 19 * * *' # 매일 한국 시간 오전 4시 실행
  workflow_dispatch: 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Extract
        run: |
          mkdir -p public
          cd public
          wget "https://epgshare01.online/epgshare01/epg_ripper_KR1.xml.gz"
          gunzip epg_ripper_KR1.xml.gz

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      # [추가된 코드] 60일 자동 정지 방지를 위한 Keepalive 액션
      # 일주일에 한 번씩 자동으로 무의미한 커밋을 남겨 정지를 막습니다.
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
