name: Auto Download and Deploy

on:
  schedule:
    - cron: '0 19 * * *' # 매일 한국 시간 오전 4시 실행
  workflow_dispatch: 

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # [추가된 부분] 깃허브 시스템을 만족시키는 합법적인 생존 신고
      # 매일 keepalive_log.txt 라는 파일에 오늘 날짜를 기록하고 저장소에 업데이트합니다.
      - name: Prevent Cron Suspension
        run: |
          date > keepalive_log.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive_log.txt
          git commit -m "Auto Keepalive Update" || echo "No changes"
          git push

      - name: Download and Extract
        run: |
          mkdir -p public
          cd public
          wget "https://epgshare01.online/epgshare01/epg_ripper_KR1.xml.gz"
          gunzip epg_ripper_KR1.xml.gz

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
